version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "MICROCMS_API_KEY=$MICROCMS_API_KEY" >> .env.production
        - echo "REVALIDATE_SECRET=$REVALIDATE_SECRET" >> .env.production
        - echo "NILTO_API_KEY=$NILTO_API_KEY" >> .env.production
        - echo "NILTO_SPACE_ID=$NILTO_SPACE_ID" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
